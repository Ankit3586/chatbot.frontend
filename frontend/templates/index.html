<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTCE Assistant Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar glassmorphism-dark">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">🤖</div>
                    <h3>LTCE</h3>
                </div>
                <span class="status-badge">Online</span>
            </div>
            
            <div class="user-profile">
                <div class="avatar">{{ username[0] | upper }}</div>
                <div class="user-info">
                    <p class="name">{{ username }}</p>
                    <p class="role">Verified Student</p>
                </div>
            </div>

            <div class="chat-history-wrapper">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h4 style="margin: 0;">Recent Conversations</h4>
                    <button onclick="clearHistory()" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px;font-family:inherit;" title="Clear Chat">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2 2v2"></path></svg>
                        Clear
                    </button>
                </div>
                <div class="chat-history-list" id="history-container">
                    <!-- JS will populate -->
                    <div class="history-loader">Loading history...</div>
                </div>
            </div>

            <div class="sidebar-footer">
                <a href="/logout" class="btn-logout">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Sign Out
                </a>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-content">
            <header class="top-nav glassmorphism">
                <div class="nav-titles">
                    <h2>Hello, {{ username }} 👋</h2>
                    <p>Ask me anything about LTCE fees, admissions, courses, or placements.</p>
                </div>
            </header>
            
            <div class="chat-viewport" id="chat-viewport">
                <div id="chat-box" class="chat-messages">
                    <div class="message-wrapper bot-wrapper">
                        <div class="message-bubble bot">
                            Welcome back! I'm the LTCE Assistant AI. How can I assist you today?
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-area">
                <div class="faq-bubbles hidden-scrollbar">
                    <button class="pill-btn" onclick="quickQuery('How can I get a Bonafide Certificate?')">📄 Bonafide</button>
                    <button class="pill-btn" onclick="quickQuery('What is the process for Railway Concession?')">🚂 Rail Pass</button>
                    <button class="pill-btn" onclick="quickQuery('How do I fill Exam Forms or ATKT?')">📝 Exam Forms</button>
                    <button class="pill-btn" onclick="quickQuery('When do I pay next year fees?')">💳 Fee Payment</button>
                    <button class="pill-btn" onclick="quickQuery('What facilities does the campus have?')">🏢 Facilities</button>
                    <button class="pill-btn" onclick="quickQuery('What is the contact number and email?')">📞 Contact Info</button>
                </div>
                
                <div class="input-container glassmorphism">
                    <input type="text" id="msg" placeholder="Ask a question..." autocomplete="off" onkeypress="if(event.key==='Enter') send();">
                    <button class="btn-send" onclick="send()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/script.js"></script>
    <script>
        function quickQuery(q) {
            document.getElementById('msg').value = q;
            send();
        }
    </script>
</body>
</html>
